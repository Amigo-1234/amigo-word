<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Reminder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0a0a0a, #1a0b0b);
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: #120707;
  border-bottom: 1px solid #2a0f0f;
}

.header h1 {
  margin: 0;
  font-size: 20px;
  color: #ff4d4d;
}

.headerBtns {
  display: flex;
  gap: 10px;
}

.addBtn {
  background: linear-gradient(135deg, #6d0f1a, #ff4d4d);
  border: none;
  width: 42px;
  height: 42px;
  border-radius: 12px;
  font-size: 22px;
  color: white;
  cursor: pointer;
}

/* LIST */
#list {
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* CARD */
.card {
  background: linear-gradient(135deg, rgba(255,0,0,0.25), rgba(0,0,0,0.5));
  border: 1px solid rgba(255,0,0,0.3);
  border-radius: 18px;
  padding: 15px;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 25px rgba(255,0,0,0.25);
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.word {
  font-weight: 600;
  font-size: 16px;
}

.meaning {
  font-size: 14px;
  color: #ddd;
  margin: 6px 0;
}

.bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.time {
  font-size: 12px;
  color: #ff7b7b;
}

/* TOGGLE */
.switch {
  position: relative;
  width: 46px;
  height: 24px;
}

.switch input { display: none; }

.slider {
  position: absolute;
  inset: 0;
  background: #333;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.slider::before {
  content: "";
  position: absolute;
  height: 18px;
  width: 18px;
  left: 3px;
  top: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider {
  background: #ff4d4d;
}

input:checked + .slider::before {
  transform: translateX(22px);
}

/* DELETE */
.delete {
  font-size: 18px;
  color: #ff4d4d;
  background: rgba(255,0,0,0.1);
  border-radius: 8px;
  padding: 5px;
  border: none;
  cursor: pointer;
}

/* MODAL */
#modal {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.85);
}

.modalContent {
  background: #120707;
  padding: 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 350px;
}

.modalContent h2 {
  color: #ff4d4d;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
  background: #1f0b0b;
  color: white;
}

.save {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #6d0f1a, #ff4d4d);
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <h1>Word Reminder</h1>
  <div class="headerBtns">
    <button class="addBtn" onclick="openModal()">+</button>
  </div>
</div>

<div id="list"></div>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
  <div class="modalContent" onclick="event.stopPropagation()">
    <h2>Add Word</h2>
    <input id="word" placeholder="Word">
    <input id="meaning" placeholder="Meaning">
    <input id="time" type="number" placeholder="Minutes">
    <button class="save" onclick="addWord()">Save</button>
  </div>
</div>

<script>
// DOM
const modal = document.getElementById("modal");
const list = document.getElementById("list");
const wordInput = document.getElementById("word");
const meaningInput = document.getElementById("meaning");
const timeInput = document.getElementById("time");

// DATA
let words = JSON.parse(localStorage.getItem("words")) || [];
let timers = {};

// MODAL
function openModal() { modal.style.display = "flex"; }
function closeModal() { modal.style.display = "none"; }

// ADD WORD
function addWord() {
  const word = wordInput.value.trim();
  const meaning = meaningInput.value.trim();
  const time = timeInput.value;

  if (!word || !meaning || !time) return alert("Fill all fields");

  const newWord = {
    word,
    meaning,
    interval: Number(time),
    isActive: true
  };

  words.push(newWord);
  localStorage.setItem("words", JSON.stringify(words));

  wordInput.value = "";
  meaningInput.value = "";
  timeInput.value = "";

  closeModal();
  render();
  startReminder(words.length - 1);
}

// RENDER
function render() {
  list.innerHTML = "";

  words.forEach((item, i) => {
    list.innerHTML += `
      <div class="card">
        <div class="top">
          <div class="word">${item.word}</div>
          <button class="delete" onclick="removeWord(${i})">🗑</button>
        </div>

        <div class="meaning">${item.meaning}</div>

        <div class="bottom">
          <div class="time">${item.interval} min</div>

          <label class="switch">
            <input type="checkbox" ${item.isActive ? "checked" : ""} onchange="toggle(${i})">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    `;
  });
}

// TOGGLE
function toggle(i) {
  words[i].isActive = !words[i].isActive;
  localStorage.setItem("words", JSON.stringify(words));

  if (words[i].isActive) startReminder(i);
  else {
    clearInterval(timers[i]);
    delete timers[i];
  }

  render();
}

// DELETE
function removeWord(i) {
  clearInterval(timers[i]);
  delete timers[i];
  words.splice(i, 1);
  localStorage.setItem("words", JSON.stringify(words));
  render();
}

// REMINDER
function startReminder(i) {
  if (timers[i]) return;

  const item = words[i];

  timers[i] = setInterval(() => {
    if (item.isActive && Notification.permission === "granted") {
      new Notification(`📘 ${item.word}`, {
        body: item.meaning
      });
    }
  }, item.interval * 60000);
}

// INIT
function init() {
  words.forEach((_, i) => {
    if (words[i].isActive) startReminder(i);
  });
}

// ASK PERMISSION
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js")
    .then(() => console.log("SW registered"));
}

// START
render();
init();
</script>

</body>
</html>

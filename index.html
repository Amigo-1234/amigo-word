<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Reminder</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0a0a0a, #1a0b0b);
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: #120707;
  border-bottom: 1px solid #2a0f0f;
}

.header h1 {
  margin: 0;
  font-size: 20px;
  color: #b11226;
  font-weight: 600;
}

/* ADD BUTTON */
.addBtn {
  background: linear-gradient(135deg, #6d0f1a, #b11226);
  border: none;
  width: 42px;
  height: 42px;
  border-radius: 12px;
  font-size: 22px;
  color: white;
  cursor: pointer;
}

/* LIST */
#list {
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* CARD */
.card {
  background: rgba(109, 15, 26, 0.15);
  border: 1px solid rgba(177, 18, 38, 0.25);
  border-radius: 16px;
  padding: 15px;
  backdrop-filter: blur(8px);
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
}

/* TOP */
.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* WORD */
.word {
  font-size: 18px;
  font-weight: 600;
}

/* MEANING */
.meaning {
  font-size: 14px;
  color: #ddd;
  margin: 6px 0;
}

/* BOTTOM */
.bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* TIME */
.time {
  font-size: 12px;
  color: #d46a6a;
}

/* TOGGLE */
.switch {
  position: relative;
  width: 46px;
  height: 24px;
}

.switch input {
  display: none;
}

.slider {
  position: absolute;
  inset: 0;
  background: #333;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.slider::before {
  content: "";
  position: absolute;
  height: 18px;
  width: 18px;
  left: 3px;
  top: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider {
  background: #b11226;
}

input:checked + .slider::before {
  transform: translateX(22px);
}

/* DELETE */
.delete {
  background: none;
  border: none;
  color: #ff5c5c;
  font-size: 18px;
  cursor: pointer;
}

/* MODAL */
#modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
}

.modalContent {
  background: #120707;
  padding: 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 350px;
}

.modalContent h2 {
  margin-top: 0;
  color: #b11226;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
  background: #1f0b0b;
  color: white;
}

/* SAVE */
.save {
  width: 100%;
  padding: 12px;
  border: none;
  background: linear-gradient(135deg, #6d0f1a, #b11226);
  color: white;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
}

/* MOBILE */
@media (max-width: 500px) {
  .word {
    font-size: 16px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>Word Reminder</h1>
  <button class="addBtn" onclick="openModal()">+</button>
</div>

<div id="list"></div>

<!-- MODAL -->
<div id="modal">
  <div class="modalContent">
    <h2>Add Word</h2>
    <input id="word" placeholder="Word">
    <input id="meaning" placeholder="Meaning">
    <input id="time" type="number" placeholder="Minutes">
    <button class="save" onclick="addWord()">Save</button>
  </div>
</div>

<script>
// DOM FIRST
const modal = document.getElementById("modal");
const list = document.getElementById("list");
const wordInput = document.getElementById("word");
const meaningInput = document.getElementById("meaning");
const timeInput = document.getElementById("time");

// DATA
let words = JSON.parse(localStorage.getItem("words")) || [];
let timers = {};

// MODAL
function openModal() {
  modal.style.display = "flex";
}

function closeModal() {
  modal.style.display = "none";
}

// ADD
function addWord() {
  const word = wordInput.value.trim();
  const meaning = meaningInput.value.trim();
  const time = timeInput.value;

  if (!word || !meaning || !time) return alert("Fill all fields");

  const newWord = {
    word,
    meaning,
    interval: Number(time),
    isActive: true
  };

  words.push(newWord);
  localStorage.setItem("words", JSON.stringify(words));

  closeModal();
  render();
  startReminder(words.length - 1);
}

// RENDER
function render() {
  list.innerHTML = "";

  words.forEach((item, index) => {
    list.innerHTML += `
      <div class="card">

        <div class="top">
          <div class="word">${item.word}</div>
          <button class="delete" onclick="removeWord(${index})">🗑</button>
        </div>

        <div class="meaning">${item.meaning}</div>

        <div class="bottom">
          <div class="time">${item.interval} min</div>

          <label class="switch">
            <input type="checkbox" ${item.isActive ? "checked" : ""} onchange="toggle(${index})">
            <span class="slider"></span>
          </label>
        </div>

      </div>
    `;
  });
}

// TOGGLE
function toggle(index) {
  words[index].isActive = !words[index].isActive;
  localStorage.setItem("words", JSON.stringify(words));

  if (words[index].isActive) {
    startReminder(index);
  } else {
    clearInterval(timers[index]);
    delete timers[index];
  }

  render();
}

// DELETE
function removeWord(index) {
  clearInterval(timers[index]);
  delete timers[index];
  words.splice(index, 1);
  localStorage.setItem("words", JSON.stringify(words));
  render();
}

// REMINDER
function startReminder(index) {
  if (timers[index]) return;

  const item = words[index];

  timers[index] = setInterval(() => {
    if (item.isActive) {
      new Notification(item.word, {
        body: item.meaning
      });
    }
  }, item.interval * 60000);
}

// INIT
function init() {
  words.forEach((_, i) => {
    if (words[i].isActive) startReminder(i);
  });
}

// NOTIFICATION
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

// START
render();
init();
</script>

</body>
</html>

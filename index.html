<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Word Reminder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#120707">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0a0a0a, #1a0b0b);
  color: white;
}

html, body {
  height: 100%;
  overflow: hidden;
}

#list {
  height: calc(100vh - 70px);
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: #120707;
  border-bottom: 1px solid #2a0f0f;
}

.header h1 {
  margin: 0;
  font-size: 20px;
  color: #b11226;
}

.addBtn {
  background: linear-gradient(135deg, #6d0f1a, #b11226);
  border: none;
  width: 42px;
  height: 42px;
  border-radius: 12px;
  font-size: 22px;
  color: white;
  cursor: pointer;
}

#notifBtn {
  background: transparent;
  border: none;
  font-size: 20px;
  color: #b11226;
  cursor: pointer;
}

/* CARD */
.card {
  background: rgba(109, 15, 26, 0.15);
  border: 1px solid rgba(177, 18, 38, 0.25);
  border-radius: 16px;
  padding: 15px;
  backdrop-filter: blur(8px);
}

.top {
  display: flex;
  justify-content: space-between;
}

.word {
  font-weight: 600;
}

.meaning {
  font-size: 14px;
  color: #ddd;
  margin: 6px 0;
}

.bottom {
  display: flex;
  justify-content: space-between;
}

.time {
  font-size: 12px;
  color: #d46a6a;
}

/* TOGGLE */
.switch {
  position: relative;
  width: 46px;
  height: 24px;
}

.switch input { display: none; }

.slider {
  position: absolute;
  inset: 0;
  background: #333;
  border-radius: 20px;
  cursor: pointer;
}

.slider::before {
  content: "";
  position: absolute;
  height: 18px;
  width: 18px;
  left: 3px;
  top: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider {
  background: #b11226;
}

input:checked + .slider::before {
  transform: translateX(22px);
}

.delete {
  background: none;
  border: none;
  color: #ff5c5c;
  cursor: pointer;
}

/* MODAL */
#modal {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.85);
}

.modalContent {
  background: #120707;
  padding: 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 350px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
  background: #1f0b0b;
  color: white;
}

.save {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #6d0f1a, #b11226);
  border: none;
  border-radius: 10px;
  color: white;
}
</style>
</head>

<body>

<div class="header">
  <h1>Word Reminder</h1>
  <button id="notifBtn">🔔</button>
  <button class="addBtn" onclick="openModal()">+</button>
</div>

<div id="list"></div>

<div id="modal">
  <div class="modalContent">
    <h2>Add Word</h2>
    <input id="word" placeholder="Word">
    <input id="meaning" placeholder="Meaning">
    <input id="time" type="number" placeholder="Minutes">
    <button class="save" onclick="addWord()">Save</button>
  </div>


  <div id="tokenBox" style="
  padding:10px;
  font-size:12px;
  word-break:break-all;
  color:#ff8080;
"></div>

</div>



<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// 🔥 INIT FIREBASE
firebase.initializeApp({
  apiKey: "AIzaSyDYpP_Uk52egku25vZ4l4iRfkswlc6U4T0",
  authDomain: "amigo-ai-bc5ac.firebaseapp.com",
  projectId: "amigo-ai-bc5ac",
  storageBucket: "amigo-ai-bc5ac.firebasestorage.app",
  messagingSenderId: "280877895436",
  appId: "1:280877895436:web:bef1e5f9f067d1cab34329"
});

const messaging = firebase.messaging();
const db = firebase.firestore();

// DOM
const modal = document.getElementById("modal");
const list = document.getElementById("list");
const wordInput = document.getElementById("word");
const meaningInput = document.getElementById("meaning");
const timeInput = document.getElementById("time");

// LOCAL STATE (temporary)
let words = [];
let timers = {};

// =====================
// 🔔 FIREBASE TOKEN
// =====================
async function initFirebaseMessaging() {
  try {
    const permission = await Notification.requestPermission();
    if (permission !== "granted") return;

    const token = await messaging.getToken({
      vapidKey: "BHaUYFnHFOGdr7oTy3L0Ie6Z4gw24mHbprxGsF4I49X1kd4nJkOFNYSaG5K7HsHCSJ2Nbf2-Dp1PvrBpUbvUOsw"
    });

    document.getElementById("tokenBox").innerText = "TOKEN: " + token;

    // SAVE TOKEN TO FIRESTORE
    await db.collection("users").doc(token).set({
      token: token,
      createdAt: new Date()
    });

  } catch (err) {
    console.error("Notification error:", err);
  }
}

initFirebaseMessaging();

// =====================
// 🧠 SAVE WORD (FIREBASE)
// =====================
async function addWord() {
  const word = wordInput.value.trim();
  const meaning = meaningInput.value.trim();
  const time = Number(timeInput.value);

  if (!word || !meaning || !time) return alert("Fill all");

  await db.collection("words").add({
    word,
    meaning,
    interval: time,
    createdAt: Date.now()
  });

  wordInput.value = "";
  meaningInput.value = "";
  timeInput.value = "";

  closeModal();
  alert("Saved to cloud ✅");
}

// =====================
// 📥 LOAD WORDS FROM FIREBASE
// =====================
async function loadWords() {
  const snapshot = await db.collection("words").get();
  words = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), isActive: true }));
  render();
}

// =====================
// 🎨 UI RENDER
// =====================
function render() {
  list.innerHTML = "";

  words.forEach((item, i) => {
    list.innerHTML += `
      <div class="card">
        <div class="top">
          <div class="word">${item.word}</div>
          <button class="delete" onclick="removeWord('${item.id}')">🗑</button>
        </div>

        <div class="meaning">${item.meaning}</div>

        <div class="bottom">
          <div class="time">${item.interval} min</div>

          <label class="switch">
            <input type="checkbox" checked onchange="toggle(${i})">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    `;
  });
}

// =====================
// 🔁 TOGGLE (UI ONLY NOW)
// =====================
function toggle(i) {
  words[i].isActive = !words[i].isActive;
}

// =====================
// 🗑 DELETE (FIREBASE)
// =====================
async function removeWord(id) {
  await db.collection("words").doc(id).delete();
  loadWords();
}

// =====================
// 📬 FOREGROUND MESSAGE
// =====================
messaging.onMessage((payload) => {
  console.log("Foreground message:", payload);

  new Notification(payload.notification.title, {
    body: payload.notification.body,
    icon: "icon.png"
  });
});

// =====================
// 🔔 TEST BUTTON
// =====================
document.getElementById("notifBtn").onclick = () => {
  new Notification("📘 Test Notification", {
    body: "Firebase system working 🔥",
    icon: "icon.png"
  });
};

// =====================
// MODAL
// =====================
function openModal() { modal.style.display = "flex"; }
function closeModal() { modal.style.display = "none"; }

// START
loadWords();
</script>

</body>
</html>

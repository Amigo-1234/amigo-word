<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Word Reminder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#120707">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0a0a0a, #1a0b0b);
  color: white;
}

.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #120707;
}

.addBtn {
  background: linear-gradient(135deg, #6d0f1a, #b11226);
  border: none;
  width: 42px;
  height: 42px;
  border-radius: 12px;
  color: white;
}

#list {
  padding: 15px;
}

.card {
  background: rgba(109,15,26,0.15);
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 10px;
}

#modal {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.85);
}

.modalContent {
  background: #120707;
  padding: 20px;
  border-radius: 16px;
  width: 90%;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
  background: #1f0b0b;
  color: white;
}
</style>
</head>

<body>

<div class="header">
  <h2>Word Reminder</h2>
  <button onclick="openModal()" class="addBtn">+</button>
</div>

<div id="list"></div>

<!-- TOKEN DISPLAY -->
<div id="tokenBox" style="padding:10px;font-size:12px;color:#ff8080;"></div>

<!-- MODAL -->
<div id="modal">
  <div class="modalContent">
    <h3>Add Word</h3>
    <input id="word" placeholder="Word">
    <input id="meaning" placeholder="Meaning">
    <input id="time" type="number" placeholder="Minutes">
    <button onclick="addWord()">Save</button>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// 🔥 INIT
firebase.initializeApp({
  apiKey: "AIzaSyDYpP_Uk52egku25vZ4l4iRfkswlc6U4T0",
  authDomain: "amigo-ai-bc5ac.firebaseapp.com",
  projectId: "amigo-ai-bc5ac",
  storageBucket: "amigo-ai-bc5ac.appspot.com",
  messagingSenderId: "280877895436",
  appId: "1:280877895436:web:bef1e5f9f067d1cab34329"
});

const messaging = firebase.messaging();
const db = firebase.firestore();

// ======================
// 🔔 FIREBASE SETUP (FIXED)
// ======================
async function setupPush() {
  try {
    const permission = await Notification.requestPermission();

    if (permission !== "granted") {
      document.getElementById("tokenBox").innerText = "❌ Permission denied";
      return;
    }

    // REGISTER SERVICE WORKER
    const reg = await navigator.serviceWorker.register('/firebase-messaging-sw.js');

    // GET TOKEN (IMPORTANT FOR IPHONE)
    const token = await messaging.getToken({
      vapidKey: "BHaUYFnHFOGdr7oTy3L0Ie6Z4gw24mHbprxGsF4I49X1kd4nJkOFNYSaG5K7HsHCSJ2Nbf2-Dp1PvrBpUbvUOsw",
      serviceWorkerRegistration: reg
    });

    if (token) {
      document.getElementById("tokenBox").innerText = "TOKEN: " + token;

      await db.collection("users").doc(token).set({
        token,
        createdAt: new Date()
      });

    } else {
      document.getElementById("tokenBox").innerText = "⚠️ No token";
    }

  } catch (err) {
    document.getElementById("tokenBox").innerText = "ERROR: " + err.message;
  }
}

setupPush();

// ======================
// ADD WORD
// ======================
async function addWord() {
  const word = document.getElementById("word").value;
  const meaning = document.getElementById("meaning").value;
  const time = Number(document.getElementById("time").value);

  if (!word || !meaning || !time) return alert("Fill all");

  await db.collection("words").add({
    word,
    meaning,
    interval: time
  });

  closeModal();
  loadWords();
}

// ======================
// LOAD WORDS
// ======================
async function loadWords() {
  const snapshot = await db.collection("words").get();
  const list = document.getElementById("list");

  list.innerHTML = "";

  snapshot.forEach(doc => {
    const data = doc.data();
    list.innerHTML += `
      <div class="card">
        <b>${data.word}</b>
        <p>${data.meaning}</p>
      </div>
    `;
  });
}

// ======================
// MODAL
// ======================
function openModal() {
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// ======================
loadWords();
</script>

</body>
</html>

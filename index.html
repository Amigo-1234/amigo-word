<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMIGO</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff0000">
</head>
<body>

  <header>
    <h1>AMIGO</h1>
    <p>Your Smart Word Trainer</p>
  </header>

  <div class="form-card">
    <input id="word" placeholder="Word..." />
    <input id="meaning" placeholder="Meaning..." />
    <input id="time" type="number" placeholder="Interval (minutes)" />
    <button id="addBtn">+ Add Word</button>
  </div>

  <div id="cards"></div>

<button id="testBtn">🔔 Test Notification</button>

<script src="app.js"></script>
</body>
</html>
